<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Agentic AI Supply Chain</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-page">
    <div class="glass-container">
        <div class="login-box">
            <header>
                <h1><span class="highlight">Agentic AI</span></h1>
                <p>Supply Chain Control Tower</p>
            </header>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="e.g. admin" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="primary-btn">Sign In</button>
                <div id="login-error" class="error-text hidden">Invalid credentials. Try admin/admin.</div>
            </form>

            <footer>
                <p>&copy; 2026 Agentic AI Systems</p>
            </footer>
        </div>
    </div>

    <script>
        // Simple authentication simulation
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('login-error');

            if (user === 'admin' && pass === 'admin') {
                localStorage.setItem('auth_token', 'demo-token-' + Date.now());
                window.location.href = 'index.html';
            } else {
                error.classList.remove('hidden');
            }
        });

        // Clear error on input
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('login-error').classList.add('hidden');
            });
        });
    </script>
</body>

</html>
